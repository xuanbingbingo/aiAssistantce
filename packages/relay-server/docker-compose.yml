version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: ai_assistant_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$DB_PASS"]
      interval: 10s
      timeout: 5s
      retries: 12

  relay:
    build: .
    container_name: ai_assistant_relay
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
