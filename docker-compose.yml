version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-assistant-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ai_assistant
    ports:
      - "13310:3306"
    volumes:
      - ai-assistant-mysql-data:/var/lib/mysql
      - ./packages/relay-server/src/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - gateway-net

  relay-server:
    build: ./packages/relay-server
    container_name: ai-assistant-relay
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gateway-net

volumes:
  ai-assistant-mysql-data:

networks:
  gateway-net:
    external: true
    name: gateway-net
